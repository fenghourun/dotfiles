# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# format = """
# [╭─](bold green)$username in $directory$git_branch$git_status$bun$rust$kubernetes$python$aws$time$cmd_duration
# [╰─](bold green)$character """

format = """
[░▒▓](#8ec07c)\
[  ](bg:#8ec07c fg:#090c0c)\
$hostname\
[](bg:#83a598 fg:#8ec07c)\
$directory\
[](fg:#83a598 bg:#394260)\
$git_branch\
$git_status\
[](fg:#394260 bg:#212736)\
$bun\
$rust\
$python\
[](fg:#212736 bg:#1d2230)\
$time\
[ ](fg:#1d2230)\
\n$character"""

# Full path
# [directory]
# truncation_length = 0

[directory]
style = "fg:#090c0c bg:#83a598"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[username]
format = " [$user]($style)"

[aws]
format = '\[[$symbol($profile)(\($region\))(\[$duration\])]($style)\]'

[git_branch]
symbol = ""
style = "bg:#394260"
format = '[[ $symbol $branch ](bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](bg:#394260)]($style)'

# [git_branch]
# format = '\[[$symbol$branch]($style)\]'
#
# [git_status]
# format = '([\[$all_status$ahead_behind\]]($style))'

[haskell]
format = '\[[$symbol($version)]($style)\]'

[lua]
format = '\[[$symbol($version)]($style)\]'

[nodejs]
format = '\[[$symbol($version)]($style)\]'

[bun]
format = '\[[$symbol($version)]($style)\]'

[python]
style = "fg:#769ff0 bg:#212736"
format = '[[ ${symbol} ${pyenv_prefix}(${version})( \($virtualenv\))](fg:#769ff0 bg:#212736)]($style)'

[rust]
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[kubernetes]
format = '\[[⛵ on ($cluster)](green) \]'

# [time]
# disabled = false
# format = ' --[ $time ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[  $time ](fg:#a0a9cb bg:#1d2230)]($style)'

[hostname]
ssh_only = true          # only render when connected over SSH (i.e. devserver)
ssh_symbol = "🌐 "
trim_at = "."            # drop the domain, keep just the host name
style = "fg:#090c0c bg:#8ec07c"
format = "[ $ssh_symbol$hostname ]($style)"
