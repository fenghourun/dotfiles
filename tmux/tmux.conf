# ── Prefix ────────────────────────────────────────────────────────────────
# Ctrl-a instead of the default Ctrl-b (easier reach over SSH).
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # press C-a twice to send a literal C-a

# ── Terminal / colors ───────────────────────────────────────────────────────
# tmux-256color + truecolor passthrough so neovim renders correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# Snappier ESC handling (default 500ms makes neovim feel laggy).
set -sg escape-time 10
# Let neovim know when it gains/loses focus (autoread, autosave plugins).
set -g focus-events on

# ── Quality of life ─────────────────────────────────────────────────────────
set -g mouse on                 # scroll, select panes/windows with the mouse
set -g history-limit 50000      # generous scrollback
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gapless after closing
set -g set-titles on            # update the terminal title (shows host/session)
set -g set-titles-string "#h: #S"
setw -g mode-keys vi            # vi keys in copy mode

# ── Status bar ──────────────────────────────────────────────────────────────
set -g status-style bg=default,fg=color172
set -g status-left "#[fg=color172,bold] #S #[default]"   # session name
set -g status-left-length 30
set -g status-right "#[fg=color172] #h "                   # devserver hostname
setw -g window-status-current-style fg=color172,bold

# ── Splits / windows (open in the current pane's directory) ──────────────────
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Resize panes (repeatable: hold prefix, tap h/j/k/l)
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 2
bind -r h resize-pane -L 2

# ── Plugins ─────────────────────────────────────────────────────────────────
# Plugins live in this repo at ~/.config/tmux/plugins (git submodules), not the
# default ~/.tmux. Point tpm there via its env var instead of a symlink.
# run-shell expands $HOME, so the path is correct on both macOS and the devserver.
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"'

set -g @plugin 'tmux-plugins/tpm'
# Ctrl-h/j/k/l moves seamlessly between neovim splits and tmux panes.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize tpm (keep this run line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
