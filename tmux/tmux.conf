# ── Prefix ────────────────────────────────────────────────────────────────
# Ctrl-a instead of the default Ctrl-b (easier reach over SSH).
unbind C-b
set -g prefix C-a
bind C-a send-prefix          # press C-a twice to send a literal C-a

# ── Terminal / colors ───────────────────────────────────────────────────────
# tmux-256color + truecolor passthrough so neovim renders correctly inside tmux.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"
# Synchronized output (DEC mode 2026): let neovim's 'termsync' batch whole frames
# so redraws don't tear/flicker. WezTerm (the outer terminal) supports it but
# connects as xterm-256color, so advertise it here or tmux drops sync passthrough.
set -ga terminal-features ",xterm-256color:sync"
set -ga terminal-features ",*256col*:sync"

# Snappier ESC handling (default 500ms makes neovim feel laggy).
set -sg escape-time 10
# Let neovim know when it gains/loses focus (autoread, autosave plugins).
set -g focus-events on

# ── Quality of life ─────────────────────────────────────────────────────────
set -g default-command "${SHELL}"  # new panes run the login shell
set -g mouse on                 # scroll, select panes/windows with the mouse
set -g history-limit 50000      # generous scrollback
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # keep window numbers gapless after closing
set -g set-titles on            # update the terminal title (shows host/session)
set -g set-titles-string "#h: #S"
setw -g mode-keys vi            # vi keys in copy mode

# ── Status bar ──────────────────────────────────────────────────────────────
# Palette mirrors the wezterm "chalk" theme (see wezterm/wezterm.lua) so the
# tmux status bar matches the terminal's tab bar. Truecolor is enabled above,
# so hex colors render correctly.
#   #c3f884  green accent  (active window highlight)
#   #8ec07c  soft green (session / host pills)
#   #1e362f  background_light (pill backdrops)
#   #182b26  background_dark (active window text color)
#   #6b7a72  muted grey-green (inactive windows)
# Keep the bar transparent so it blends with the terminal background.
set -g status-style bg=default,fg=color172
# Session name (left) and hostname (right) as rounded pills (Nerd Font glyphs
# 's the half-circle caps). Soft green so they harmonize with the brighter
# green active-window pill without competing with it.
set -g status-left "#[fg=#1e362f]#[bg=#1e362f,fg=#8ec07c,bold]  #S #[fg=#1e362f,bg=default]#[default] "
set -g status-left-length 30
set -g status-right "#[fg=#1e362f,bg=default]#[bg=#1e362f,fg=#8ec07c,bold]  #h #[fg=#1e362f,bg=default]#[default]"

# Windows are tmux's "tabs". Dim the inactive ones; the active one becomes a
# bright green "pill" (green backdrop, dark text) so it clearly stands out.
setw -g window-status-style "fg=#6b7a72"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "bg=#c3f884,fg=#182b26,bold"
setw -g window-status-current-format " #I:#W "

# ── Splits / windows (open in the current pane's directory) ──────────────────
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Reload config
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# Resize panes (repeatable: hold prefix, tap h/j/k/l)
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 2
bind -r h resize-pane -L 2

# ── Plugins ─────────────────────────────────────────────────────────────────
# Plugins live in this repo at ~/.config/tmux/plugins (git submodules), not the
# default ~/.tmux. Point tpm there via its env var instead of a symlink.
# run-shell expands $HOME, so the path is correct on both macOS and the devserver.
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"'

set -g @plugin 'tmux-plugins/tpm'
# Ctrl-h/j/k/l moves seamlessly between neovim splits and tmux panes.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Initialize tpm (keep this run line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
